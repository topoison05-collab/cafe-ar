<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 AR体験（壁面マーカー用）</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* センサー許可ポップアップの日本語化 */
        #ar-prompt {
            position: fixed; z-index: 9999; background: white;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 25px; border-radius: 15px; width: 85%; max-width: 320px;
            text-align: center; font-family: "Helvetica Neue", Arial, sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #ar-prompt p { margin-bottom: 20px; line-height: 1.6; color: #333; }
        #ar-prompt button {
            margin: 5px; padding: 12px 24px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px;
        }
        #allow-btn { background: #50C8F8; color: white; }
        #deny-btn { background: #eee; color: #666; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ar-prompt">
        <p>ARで「とらくん」を表示するために、カメラとセンサーのアクセスを許可してください。</p>
        <button id="allow-btn">許可する</button>
        <button id="deny-btn">閉じる</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false">
        
        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-entity position="0 0 0.5" rotation="0 0 0">
                
                <a-entity 
                    gltf-model="url(tora-v1.glb)" 
                    scale="1 1 1"
                    rotation="90 0 180">
                    </a-entity>
                
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const prompt = document.querySelector('#ar-prompt');
        const allowBtn = document.querySelector('#allow-btn');
        const denyBtn = document.querySelector('#deny-btn');

        // センサーアクセス許可の処理
        allowBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            prompt.style.display = 'none';
                        } else {
                            alert('センサーへのアクセスが拒否されました。設定を確認してください。');
                        }
                    })
                    .catch(console.error);
            } else {
                // PCや古いAndroidなどの場合
                prompt.style.display = 'none';
            }
        });

        denyBtn.addEventListener('click', function() {
            prompt.style.display = 'none';
        });
    </script>
</body>
</html>
