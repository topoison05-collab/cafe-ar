<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>かふぇ絲 AR</title>
    <script src="https://cdn.nianticspatial.com/sdk/v1/niantic-web-ar.js"></script>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #start-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px 40px; background: #fff; border-radius: 50px;
            font-size: 18px; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <button id="start-button">タップしてARを開始</button>

    <niantic-vps-scene id="ar-scene" location-id="baabee12-b43b-47c9-8e7f-70c57702746f" render-camera="true">
        <niantic-model src="tora-v1.glb" scale="1 1 1" position="0 0 0"></niantic-model>
    </niantic-vps-scene>

    <script>
        const startButton = document.getElementById('start-button');
        
        startButton.addEventListener('click', async () => {
            // iPhoneのセンサー許可だけをここで実行
            if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
                try {
                    await DeviceOrientationEvent.requestPermission();
                } catch (e) {
                    console.error("センサー許可エラー:", e);
                }
            }
            
            // ボタンを消すだけで、あとはSDKが自動でカメラを起動させます
            startButton.style.display = 'none';
        });
    </script>
</body>
</html>
