<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 AR体験</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        /* 日本語ダイアログのスタイル */
        #ar-prompt {
            position: fixed; z-index: 9999; background: white;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 20px; border-radius: 10px; width: 80%; max-width: 300px;
            text-align: center; font-family: sans-serif; box-shadow: 0 0 20px rgba(0,0,0,0.3);
        }
        #ar-prompt button {
            margin: 10px; padding: 10px 20px; border: none; border-radius: 5px;
            font-weight: bold; cursor: pointer;
        }
        #allow-btn { background: #50C8F8; color: white; }
        #deny-btn { background: #F34F7B; color: white; }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-prompt">
        <p>AR体験を開始するには、センサーへのアクセスを許可してください。</p>
        <button id="deny-btn">拒否する</button>
        <button id="allow-btn">許可する</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false">
        
        <a-marker type="pattern" url="pattern-marker.patt">
            <a-entity 
                gltf-model="url(tora-v1.glb)" 
                position="0 0 0" 
                scale="1 1 1"
                rotation="90 180 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const prompt = document.querySelector('#ar-prompt');
        const allowBtn = document.querySelector('#allow-btn');
        const denyBtn = document.querySelector('#deny-btn');

        allowBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            prompt.style.display = 'none';
                        }
                    });
            } else {
                prompt.style.display = 'none';
            }
        });
        denyBtn.addEventListener('click', function() {
            prompt.innerHTML = '<p>再読み込みして許可してください。</p>';
        });
    </script>
</body>
</html>
