<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 AR体験（壁面固定版）</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        #ar-prompt {
            position: fixed; z-index: 9999; background: white;
            top: 50%; left: 50%; transform: translate(-50%, -50%);
            padding: 25px; border-radius: 15px; width: 85%; max-width: 320px;
            text-align: center; font-family: sans-serif; box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #ar-prompt button {
            margin: 10px; padding: 12px 24px; border: none; border-radius: 8px;
            font-weight: bold; cursor: pointer; font-size: 16px; background: #50C8F8; color: white;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ar-prompt">
        <p>「とらくん」を表示するために、センサーのアクセスを許可してください。</p>
        <button id="allow-btn">開始する</button>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false;"
        vr-mode-ui="enabled: false">
        
        <a-marker type="pattern" url="pattern-marker.patt">
            
            <a-entity position="0 0 0.5" rotation="0 0 0">
                
                <a-entity 
                    gltf-model="url(tora-v1.glb)" 
                    scale="1 1 1"
                    rotation="0 90 -120">
                </a-entity>
                
            </a-entity>

        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const allowBtn = document.querySelector('#allow-btn');
        allowBtn.addEventListener('click', function() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') document.querySelector('#ar-prompt').style.display = 'none';
                });
            } else {
                document.querySelector('#ar-prompt').style.display = 'none';
            }
        });
    </script>
</body>
</html>
