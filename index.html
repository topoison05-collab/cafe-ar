<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>かふぇ絲 AR</title>
    <script src="https://cdn.nianticspatial.com/sdk/v1/niantic-web-ar.js"></script>
    <style>
        /* 背景を透明にして、後ろのカメラ映像が見えるようにします */
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        canvas { display: block; }
        #start-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px 40px; background: #fff; border-radius: 50px;
            font-size: 18px; font-weight: bold; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <button id="start-button">タップしてARを開始</button>

    <niantic-vps-scene id="ar-scene" location-id="baabee12-b43b-47c9-8e7f-70c57702746f" autoplay="false" render-camera="true">
        <niantic-model src="tora-v1.glb" scale="1 1 1" position="0 0 0"></niantic-model>
    </niantic-vps-scene>

    <script>
        const startButton = document.getElementById('start-button');
        const scene = document.getElementById('ar-scene');

        startButton.addEventListener('click', async () => {
            try {
                // 1. センサー許可
                if (window.DeviceOrientationEvent && DeviceOrientationEvent.requestPermission) {
                    await DeviceOrientationEvent.requestPermission();
                }

                // 2. AR開始
                await scene.start();
                startButton.style.display = 'none';
                
            } catch (e) {
                alert("エラー: " + e.message);
            }
        });
    </script>
</body>
</html>
