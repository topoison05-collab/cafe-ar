<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>かふぇ絲 AR</title>
    <script src="https://cdn.nianticspatial.com/sdk/v1/niantic-web-ar.js"></script>
    <style>
        body, html { margin: 0; width: 100%; height: 100%; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #start-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px 40px; background: #fff; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        niantic-vps-scene { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <button id="start-button">タップしてARを開始</button>

    <niantic-vps-scene 
        id="ar-scene"
        api-key="trPrNIccFqeSZ11vV0IjY445lkmfhjMbXXTYsSJEbRY"
        location-id="baabee12-b43b-47c9-8e7f-70c57702746f" 
        render-camera="true"
        vps-enabled="true"
        autoplay="false">
        <niantic-model src="tora-v1.glb" scale="1 1 1" position="0 0 0"></niantic-model>
    </niantic-vps-scene>

    <script>
        const btn = document.getElementById('start-button');
        const scene = document.getElementById('ar-scene');

        btn.addEventListener('click', async () => {
            try {
                btn.innerText = "認証中...";

                // 1. 位置情報の許可
                if ("geolocation" in navigator) {
                    await new Promise((resolve) => {
                        navigator.geolocation.getCurrentPosition(resolve, () => {
                            console.log("Geolocation denied");
                            resolve();
                        }, { enableHighAccuracy: true });
                    });
                }

                // 2. モーションセンサーの許可
                if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }

                // 3. ブラウザ側のカメラ許可をSDKの前に「先行して」取得する（iPhone 15対策）
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
                    stream.getTracks().forEach(track => track.stop()); // 一旦止める
                } catch (e) {
                    console.warn("Camera pre-check failed:", e);
                }

                // 4. SDKの要素が準備できるまで待機してからstartを呼ぶ
                btn.innerText = "起動中...";
                
                // カスタム要素が定義されるのを待ってから実行
                customElements.whenDefined('niantic-vps-scene').then(() => {
                    btn.style.display = 'none';
                    if (scene && typeof scene.start === 'function') {
                        scene.start();
                    } else {
                        // 万が一startがまだない場合は直接autoplayを切り替える
                        scene.setAttribute('autoplay', 'true');
                    }
                    window.dispatchEvent(new Event('resize'));
                });
                
            } catch (error) {
                alert("エラーが発生しました: " + error.message);
            }
        });
    </script>
</body>
</html>
