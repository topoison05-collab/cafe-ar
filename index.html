<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 AR</title>
    <script src="https://cdn.nianticspatial.com/sdk/v1/niantic-web-ar.js"></script>
    <style>
        body { margin: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #start-button {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            z-index: 1000; padding: 20px 40px; background: #fff; border: none;
            border-radius: 50px; font-size: 18px; font-weight: bold; cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <button id="start-button">タップしてARを開始</button>

    <niantic-vps-scene id="ar-scene" location-id="baabee12-b43b-47c9-8e7f-70c57702746f" autoplay="false">
        <niantic-model src="tora-v1.glb" scale="1 1 1" position="0 0 0"></niantic-model>
    </niantic-vps-scene>

    <script>
        const startButton = document.getElementById('start-button');
        const scene = document.getElementById('ar-scene');

        startButton.addEventListener('click', async () => {
            try {
                startButton.innerText = "起動中...";
                
                // 1. iPhoneのセンサー（ジャイロ）許可をリクエスト
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }

                // 2. カメラへのアクセスを個別に強制リクエスト（エラー防止）
                await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });

                // 3. ARシーンを明示的に開始
                if (scene && typeof scene.start === 'function') {
                    scene.start();
                }
                
                // 成功したらボタンを消す
                startButton.style.display = 'none';
                
            } catch (error) {
                console.error("AR起動エラー:", error);
                // エラー内容を表示（ユーザーが設定を確認しやすくするため）
                alert("エラー詳細: " + error.name + "\n設定 ＞ Safari ＞ カメラ が「許可」になっているか確認してください。");
                startButton.innerText = "再試行";
            }
        });
    </script>
</body>
</html>
