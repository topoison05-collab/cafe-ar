<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>かふぇ絲 ARフロア</title>
    <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        /* 日本語ダイアログ（許可ポップアップ）のスタイル */
        #ar-prompt {
            position: fixed; 
            z-index: 9999; 
            background: white;
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            padding: 25px; 
            border-radius: 12px; 
            width: 80%; 
            max-width: 320px;
            text-align: center; 
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            color: #333;
        }
        #ar-prompt p {
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 16px;
        }
        #ar-prompt button {
            margin: 5px; 
            padding: 12px 24px; 
            border: none; 
            border-radius: 8px;
            font-weight: bold; 
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        #ar-prompt button:active {
            opacity: 0.7;
        }
        #allow-btn { background: #50C8F8; color: white; }
        #deny-btn { background: #F34F7B; color: white; }
    </style>
</head>

<body style="margin: 0; overflow: hidden;">

    <div id="ar-prompt">
        <p>AR体験を開始するには、デバイスの動きセンサーへのアクセスを許可してください。</p>
        <div style="display: flex; justify-content: center;">
            <button id="deny-btn">拒否する</button>
            <button id="allow-btn">許可する</button>
        </div>
    </div>

    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        device-orientation-permission-ui="enabled: false"
        vr-mode-ui="enabled: false">
        
        <a-marker type="pattern" url="pattern-marker.patt">
            <a-entity 
                gltf-model="url(tora-v1.glb)" 
                position="0 0 0" 
                scale="3 3 3"
                rotation="-90 90 0">
            </a-entity>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const prompt = document.querySelector('#ar-prompt');
        const allowBtn = document.querySelector('#allow-btn');
        const denyBtn = document.querySelector('#deny-btn');

        // 許可ボタンが押された時の動作
        allowBtn.addEventListener('click', function() {
            // iOSなどのモーションセンサー許可リクエスト
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response === 'granted') {
                            // 許可されたらダイアログを消す
                            prompt.style.display = 'none';
                        } else {
                            alert('センサーへのアクセスが拒否されました。設定からブラウザの動作権限を確認してください。');
                        }
                    })
                    .catch(error => {
                        console.error('Permission error:', error);
                        prompt.style.display = 'none'; // エラー時もとりあえず閉じる
                    });
            } else {
                // iOS13以前やAndroid、PCなどの場合はそのままダイアログを閉じる
                prompt.style.display = 'none';
            }
        });

        // 拒否ボタンが押された時の動作
        denyBtn.addEventListener('click', function() {
            prompt.innerHTML = '<p style="margin:0;">体験を中止しました。<br>開始するにはページを再読み込みしてください。</p>';
        });
    </script>

</body>
</html>
