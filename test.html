<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かふぇ絲 AR体験</title>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <style>
        body { margin: 0; overflow: hidden; }
        /* 読み込み中・スキャン中の標準UIを非表示 */
        .mindar-ui-scanning, .mindar-ui-loading { display: none; }
    </style>
</head>
<body>

    <a-scene 
        mindar-image="imageTargetSrc: ./torakun.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <img id="test-img" src="test.png">
            <a-asset-item id="tora-model" src="nazotoki.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model 
                src="#tora-model" 
                position="0 0 0.1" 
                scale="3 3 3" 
                rotation="180 90 180"
                animation-mixer>
            </a-gltf-model>
        </a-entity>

    </a-scene>

</body>
</html>
