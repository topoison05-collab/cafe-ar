<!-- パスワード入力画面（最初はこれが表示される） -->
<div id="gatekeeper" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #f0f0f0; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
    <h2 style="color: #333; margin-bottom: 20px;">合言葉を入力してください</h2>
    <input type="text" id="pass-input" style="padding: 12px; font-size: 18px; border-radius: 8px; border: 1px solid #ccc; width: 200px; text-align: center;">
    <button onclick="checkPass()" style="margin-top: 20px; padding: 12px 40px; background: #333; color: #fff; border: none; border-radius: 25px; font-weight: bold; cursor: pointer;">
        とらくんに会いに行く
    </button>
</div>

<!-- AR表示部分（最初は隠しておく） -->
<div id="ar-content" style="display: none;">
    <model-viewer 
        src="tora-basuket-goal.glb" 
        ios-src="tora-basuket4.usdz#allowsContentScaling=1&canonicalWebPageURL=https://ito.cafe"
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        ar-placement="floor"
        ar-scale="auto"
        camera-controls 
        touch-action="none"
        shadow-intensity="1" 
        auto-rotate
        camera-orbit="90deg 75deg 100%"
        min-camera-orbit="auto auto 5%"
        alt="かふぇ絲のキャラクター とらくんの3Dモデル"
        autoplay
        animation-name="*"
        loading="eager"
        reveal="auto">
        
        <button slot="ar-button" class="ar-button">
            とらくんのフリースローを出現させる
        </button>
    </model-viewer>
</div>

<script>
    function checkPass() {
        const pass = document.getElementById('pass-input').value;
        // 合言葉をここで設定（例：ito）
        if (pass === "ito") {
            document.getElementById('gatekeeper').style.display = 'none';
            document.getElementById('ar-content').style.display = 'block';
        } else {
            alert("合言葉が違います。もう一度入力してください。");
        }
    }
</script>
