<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>かふぇ絲 AR体験</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image.prod.js"></script>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v6.1.1/dist/aframe-extras.min.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; }
        .mindar-ui-scanning, .mindar-ui-loading { display: none !important; }

        /* 撮影ボタン */
        #screenshot-btn {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            padding: 15px 30px;
            background: #fff;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* プレビュー画面（最初は隠す） */
        #preview-container {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            z-index: 2000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #preview-img {
            max-width: 90%;
            max-height: 70%;
            border: 3px solid white;
        }

        .preview-ui {
            margin-top: 20px;
            text-align: center;
        }

        .preview-ui p {
            color: white;
            font-size: 14px;
            margin-bottom: 15px;
        }

        /* 戻るボタン */
        #back-btn {
            padding: 12px 40px;
            background: #444;
            color: white;
            border: none;
            border-radius: 25px;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

    <button id="screenshot-btn">📸 スクリーンショット</button>

    <!-- 撮影後の確認画面 -->
    <div id="preview-container">
        <img id="preview-img" src="">
        <div class="preview-ui">
            <p>画像を長押しして「写真に保存」してください</p>
            <button id="back-btn">ARに戻る</button>
        </div>
    </div>

    <a-scene 
        id="scene"
        mindar-image="imageTargetSrc: ./tommy.mind; filterMinCF: 0.0001; filterBeta: 0.001;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights, preserveDrawingBuffer: true" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <a-asset-item id="tora-model" src="torakun-sing.glb"></a-asset-item>
            <a-asset-item id="king-model" src="king-v1.glb"></a-asset-item>
            <a-asset-item id="kapper-model" src="kepper-v1.glb"></a-asset-item>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity mindar-image-target="targetIndex: 0">
            <a-gltf-model src="#tora-model" position="0 -0.1 0.1" scale="4 4 4" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 1">
            <a-gltf-model src="#king-model" position="0 -0.1 0.1" scale="2 2 2" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>
        <a-entity mindar-image-target="targetIndex: 2">
            <a-gltf-model src="#kapper-model" position="0 -0.1 0.1" scale="2 2 2" rotation="180 90 90" animation-mixer="clip: *; loop: repeat"></a-gltf-model>
        </a-entity>
    </a-scene>

    <script>
        const shotBtn = document.querySelector("#screenshot-btn");
        const backBtn = document.querySelector("#back-btn");
        const previewContainer = document.querySelector("#preview-container");
        const previewImg = document.querySelector("#preview-img");
        const sceneEl = document.querySelector("a-scene");

        // 撮影処理
        shotBtn.addEventListener("click", () => {
            const video = document.querySelector("video");
            const canvas = sceneEl.canvas;

            // 背景とモデルを合成
            const captureCanvas = document.createElement("canvas");
            captureCanvas.width = canvas.width;
            captureCanvas.height = canvas.height;
            const ctx = captureCanvas.getContext("2d");

            ctx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
            ctx.drawImage(canvas, 0, 0, captureCanvas.width, captureCanvas.height);

            // 同じタブ内で画像を表示
            previewImg.src = captureCanvas.toDataURL("image/png");
            previewContainer.style.display = "flex";
        });

        // ARに戻る処理
        backBtn.addEventListener("click", () => {
            previewContainer.style.display = "none";
        });
    </script>

</body>
</html>
